<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; connect-src https://api.open-meteo.com https://worldtimeapi.org https://meme-api.com; frame-src https: http:;">
  <title>Mahlzeit Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <div class="grid-layer"></div>

  <main class="dashboard">
    <header class="topbar glass-shell">
      <div class="header-left">
        <div class="system-state"><span class="live-pulse"></span><strong>SYSTEM ONLINE</strong></div>
        <button id="lunch-preview" class="glow-button" type="button">🍽️ Mahlzeit testen</button>
      </div>

      <section class="weather-strip" aria-label="Aktuelles Wetter">
        <div id="weather-icon" class="weather-icon">◌</div>
        <div class="weather-main">
          <strong id="weather-temp">--°</strong>
          <span id="weather-description">Wetter wird geladen</span>
        </div>
        <div class="weather-meta">
          <span id="weather-location">Kempten</span>
          <span id="weather-details">--</span>
        </div>
      </section>

      <div class="clock-area">
        <div id="date" class="date"></div>
        <div id="clock" class="clock">--:--:--</div>
        <div id="clock-sync" class="clock-sync">NETZZEIT WIRD SYNCHRONISIERT</div>
      </div>
    </header>

    <section class="content-grid">
      <article class="panel browser-panel premium-panel">
        <div class="panel-glow"></div>
        <div class="panel-header browser-toolbar">
          <div class="panel-identity">
            <div class="panel-icon monitoring-icon"><span></span><span></span><span></span></div>
            <div><span class="panel-kicker">LIVE VIEW</span><strong>Device Monitoring</strong></div>
          </div>
          <div class="browser-address"><span class="status-dot"></span><span>Monitoring-Sitzung aktiv</span></div>
          <div class="browser-actions">
            <button id="browser-back" type="button" title="Zurück">←</button>
            <button id="browser-forward" type="button" title="Vor">→</button>
            <button id="browser-home" type="button" title="Startseite">⌂</button>
            <button id="browser-reload" type="button" title="Neu laden">↻</button>
          </div>
        </div>
        <div id="browser-loading" class="browser-loading"><div class="loader-core"><span></span><span></span><span></span></div><p>Monitoring wird verbunden</p></div>
        <webview id="monitoring-browser" allowpopups partition="persist:monitoring"></webview>
      </article>

      <article class="panel meme-panel premium-panel">
        <div class="panel-glow"></div>
        <div class="panel-header">
          <div class="panel-identity">
            <div class="panel-icon meme-panel-icon">M</div>
            <div><span class="panel-kicker">R/DEUTSCHEMEMES</span><strong>Meme der halben Stunde</strong></div>
          </div>
          <button id="meme-refresh" class="glow-button compact" type="button">↻ Neues Meme</button>
        </div>
        <div id="meme-content" class="meme-content loading-card"><div class="skeleton-orbit"></div>Deutsches Meme wird geladen</div>
      </article>
    </section>
  </main>

  <section id="announcement" class="announcement" aria-live="assertive" aria-hidden="true">
    <div class="announcement-grid"></div>
    <div class="announcement-ring ring-one"></div>
    <div class="announcement-ring ring-two"></div>
    <button id="announcement-close" class="glow-button announcement-close" type="button">Test schließen ×</button>
    <div class="announcement-inner">
      <div class="announcement-label">OFFICE BROADCAST</div>
      <div id="announcement-icon" class="announcement-icon">🍽️</div>
      <div id="announcement-text" class="announcement-text"></div>
      <div id="announcement-subtext" class="announcement-subtext"></div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
